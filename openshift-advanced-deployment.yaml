# Configurações Avançadas de Deployment no OpenShift

---
# Canary Deployment - Deploy gradual com análise de tráfego
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacao-canary
  namespace: aplicacao
  labels:
    app: aplicacao
    version: canary
spec:
  replicas: 1  # Apenas 1 réplica para teste
  selector:
    matchLabels:
      app: aplicacao
      version: canary
  template:
    metadata:
      labels:
        app: aplicacao
        version: canary
    spec:
      containers:
      - name: aplicacao
        image: seu-registry.azurecr.io/aplicacao:canary
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
# Blue-Green Deployment - Duas versões paralelas
apiVersion: v1
kind: Service
metadata:
  name: aplicacao-blue
  namespace: aplicacao
spec:
  selector:
    app: aplicacao
    version: blue
  ports:
  - port: 80
    targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: aplicacao-green
  namespace: aplicacao
spec:
  selector:
    app: aplicacao
    version: green
  ports:
  - port: 80
    targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: aplicacao-active
  namespace: aplicacao
spec:
  # Service que alterna entre blue e green
  selector:
    app: aplicacao
    version: blue  # Mude para 'green' quando pronto para trocar
  ports:
  - port: 80
    targetPort: 8080

---
# StatefulSet para aplicações com estado
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aplicacao-stateful
  namespace: aplicacao
spec:
  serviceName: aplicacao-headless
  replicas: 3
  selector:
    matchLabels:
      app: aplicacao
      type: stateful
  template:
    metadata:
      labels:
        app: aplicacao
        type: stateful
    spec:
      containers:
      - name: aplicacao
        image: seu-registry.azurecr.io/aplicacao:latest
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 10Gi

---
# DaemonSet - Um pod em cada nó
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: aplicacao-daemonset
  namespace: aplicacao
spec:
  selector:
    matchLabels:
      app: aplicacao-daemon
  template:
    metadata:
      labels:
        app: aplicacao-daemon
    spec:
      tolerations:
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
      containers:
      - name: aplicacao
        image: seu-registry.azurecr.io/aplicacao:latest
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# Job - Execução única/periódica
apiVersion: batch/v1
kind: Job
metadata:
  name: aplicacao-migration
  namespace: aplicacao
spec:
  template:
    spec:
      containers:
      - name: migration
        image: seu-registry.azurecr.io/aplicacao:latest
        command: ["./migrate.sh"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_URL
      restartPolicy: Never
  backoffLimit: 3

---
# CronJob - Job periódico
apiVersion: batch/v1
kind: CronJob
metadata:
  name: aplicacao-backup
  namespace: aplicacao
spec:
  schedule: "0 2 * * *"  # 2h da manhã, todo dia
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: seu-registry.azurecr.io/aplicacao:latest
            command: ["./backup.sh"]
            env:
            - name: BACKUP_LOCATION
              value: "/backups"
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-pvc
          restartPolicy: OnFailure
      backoffLimit: 3

---
# PersistentVolumeClaim para dados persistentes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: aplicacao
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-premium
  resources:
    requests:
      storage: 100Gi
