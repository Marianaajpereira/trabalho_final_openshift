---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: lab-open-shift-mariana364217
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: lab-open-shift-mariana364217
type: Opaque
stringData:
  DATABASE_PASSWORD: "sua-senha-banco-dados"
  API_KEY: "sua-api-key"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trabalho-final-openshift
  namespace: lab-open-shift-mariana364217
  labels:
    app: trabalho-final-openshift
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: trabalho-final-openshift
  template:
    metadata:
      labels:
        app: trabalho-final-openshift
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install flask &&
            cat > /app.py <<'EOF'
            from flask import Flask
            app = Flask(__name__)
            
            @app.route('/')
            def hello():
                return "Hello World"
            
            @app.route('/health')
            def health():
                return {"status": "healthy"}
            
            @app.route('/health/live')
            def health_live():
                return {"status": "alive"}
            
            @app.route('/health/ready')
            def health_ready():
                return {"status": "ready"}
            
            if __name__ == '__main__':
                app.run(host='0.0.0.0', port=8080, debug=False)
            EOF
            python /app.py
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ENVIRONMENT
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_PASSWORD
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: API_KEY
        
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: trabalho-final-openshift
  namespace: lab-open-shift-mariana364217
  labels:
    app: trabalho-final-openshift
spec:
  type: ClusterIP
  selector:
    app: trabalho-final-openshift
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
