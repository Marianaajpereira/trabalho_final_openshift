# Quotas e Limites de Recursos no OpenShift
# Garantem que a aplicação não consuma recursos excessivos

apiVersion: v1
kind: ResourceQuota
metadata:
  name: aplicacao-quota
  namespace: aplicacao
spec:
  # Limites totais para a namespace
  hard:
    requests.cpu: "10"          # Total de CPU solicitado
    requests.memory: "20Gi"     # Total de memória solicitada
    limits.cpu: "20"            # Total de CPU limitado
    limits.memory: "40Gi"       # Total de memória limitada
    pods: "50"                  # Número máximo de pods
    services: "10"              # Número máximo de services
    services.nodeports: "2"     # Serviços com NodePort
    services.loadbalancers: "2" # Serviços com LoadBalancer
    persistentvolumeclaims: "5" # PVCs
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values: ["high", "medium"]

---
apiVersion: v1
kind: LimitRange
metadata:
  name: aplicacao-limits
  namespace: aplicacao
spec:
  limits:
  # Limites por container
  - type: Container
    max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    
  # Limites por pod
  - type: Pod
    max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "100m"
      memory: "256Mi"
    
  # Limites por PVC
  - type: PersistentVolumeClaim
    max:
      storage: "20Gi"
    min:
      storage: "1Gi"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: aplicacao-high-priority
value: 1000
globalDefault: false
description: "PriorityClass para aplicação crítica"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: aplicacao-medium-priority
value: 500
globalDefault: false
description: "PriorityClass para aplicação média"
