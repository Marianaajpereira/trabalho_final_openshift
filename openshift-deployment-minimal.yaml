---
apiVersion: v1
kind: Namespace
metadata:
  name: aplicacao
  labels:
    name: aplicacao

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: aplicacao
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: aplicacao
type: Opaque
stringData:
  DATABASE_PASSWORD: "sua-senha-banco-dados"
  API_KEY: "sua-api-key"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacao-deployment
  namespace: aplicacao
  labels:
    app: aplicacao
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aplicacao
  template:
    metadata:
      labels:
        app: aplicacao
        version: v1
    spec:
      serviceAccountName: aplicacao-sa
      containers:
      - name: aplicacao
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install flask &&
            cat > /app.py <<'EOF'
            from flask import Flask
            app = Flask(__name__)
            
            @app.route('/')
            def hello():
                return "Hello World"
            
            @app.route('/health/live')
            def health_live():
                return {"status": "alive"}
            
            @app.route('/health/ready')
            def health_ready():
                return {"status": "ready"}
            
            if __name__ == '__main__':
                app.run(host='0.0.0.0', port=8080, debug=False)
            EOF
            python /app.py
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ENVIRONMENT
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_PASSWORD
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: API_KEY
        
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        
        terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: aplicacao-service
  namespace: aplicacao
  labels:
    app: aplicacao
spec:
  type: ClusterIP
  selector:
    app: aplicacao
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aplicacao-route
  namespace: aplicacao
  labels:
    app: aplicacao
spec:
  to:
    kind: Service
    name: aplicacao-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aplicacao-sa
  namespace: aplicacao

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aplicacao-role
  namespace: aplicacao
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aplicacao-rolebinding
  namespace: aplicacao
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aplicacao-role
subjects:
- kind: ServiceAccount
  name: aplicacao-sa
  namespace: aplicacao
