---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trabalho-final-openshift
  namespace: lab-open-shift-mariana364217
  labels:
    app: trabalho-final-openshift
spec:
  replicas: 1
  selector:
    matchLabels:
      deployment: trabalho-final-openshift
  template:
    metadata:
      labels:
        deployment: trabalho-final-openshift
    spec:
      containers:
      - name: trabalho-final-openshift
        image: image-registry.openshift-image-registry.svc:5000/lab-open-shift-mariana364217/trabalho-final-openshift:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: trabalho-final-openshift
  namespace: lab-open-shift-mariana364217
  labels:
    app: trabalho-final-openshift
spec:
  type: ClusterIP
  selector:
    deployment: trabalho-final-openshift
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: trabalho-final-openshift
  namespace: lab-open-shift-mariana364217
  labels:
    app: trabalho-final-openshift
spec:
  to:
    kind: Service
    name: trabalho-final-openshift
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
