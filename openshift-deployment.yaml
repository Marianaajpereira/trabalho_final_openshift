apiVersion: v1
kind: Namespace
metadata:
  name: aplicacao
  labels:
    name: aplicacao

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: aplicacao
type: Opaque
stringData:
  # Adicione suas variáveis de ambiente sensíveis aqui
  DATABASE_PASSWORD: "sua-senha-aqui"
  API_KEY: "sua-api-key-aqui"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: aplicacao
data:
  # Configurações não sensíveis
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DATABASE_HOST: "database.aplicacao.svc.cluster.local"
  DATABASE_PORT: "5432"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacao-deployment
  namespace: aplicacao
  labels:
    app: aplicacao
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aplicacao
  template:
    metadata:
      labels:
        app: aplicacao
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: aplicacao-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
      - name: aplicacao
        image: seu-registry.azurecr.io/aplicacao:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        # Variáveis de ambiente
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ENVIRONMENT
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DATABASE_PORT
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_PASSWORD
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: API_KEY
        
        # Probes de saúde
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Recursos
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Volume mounts
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
      
      volumes:
      - name: config-volume
        configMap:
          name: app-config
      - name: logs-volume
        emptyDir: {}
      
      # Tolerâncias e afinidades
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - aplicacao
              topologyKey: kubernetes.io/hostname
      
      # Tempo máximo para graceful shutdown
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: aplicacao-service
  namespace: aplicacao
  labels:
    app: aplicacao
spec:
  type: ClusterIP
  selector:
    app: aplicacao
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aplicacao-route
  namespace: aplicacao
  labels:
    app: aplicacao
spec:
  host: aplicacao.apps.sua-cluster.com
  to:
    kind: Service
    name: aplicacao-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aplicacao-sa
  namespace: aplicacao

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aplicacao-role
  namespace: aplicacao
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aplicacao-rolebinding
  namespace: aplicacao
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aplicacao-role
subjects:
- kind: ServiceAccount
  name: aplicacao-sa
  namespace: aplicacao

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aplicacao-hpa
  namespace: aplicacao
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aplicacao-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
