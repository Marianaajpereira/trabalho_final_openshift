# Monitoramento com Prometheus e Alertas no OpenShift

apiVersion: v1
kind: ServiceMonitor
metadata:
  name: aplicacao-monitor
  namespace: aplicacao
  labels:
    app: aplicacao
spec:
  selector:
    matchLabels:
      app: aplicacao
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aplicacao-alerts
  namespace: aplicacao
spec:
  groups:
  - name: aplicacao.rules
    interval: 30s
    rules:
    # Alerta: Pod não está pronto
    - alert: AplicacaoPodNotReady
      expr: |
        kube_pod_status_ready{namespace="aplicacao", condition="false"} > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} não está pronto"
        description: "Pod {{ $labels.pod }} em {{ $labels.namespace }} não está pronto por 5 minutos"
    
    # Alerta: Restart de pod
    - alert: AplicacaoPodRestarting
      expr: |
        rate(kube_pod_container_status_restarts_total{namespace="aplicacao"}[15m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} está reiniciando"
        description: "Pod {{ $labels.pod }} reiniciou {{ $value }} vezes nos últimos 15 minutos"
    
    # Alerta: CPU alta
    - alert: AplicacaoCPUAlto
      expr: |
        rate(container_cpu_usage_seconds_total{namespace="aplicacao"}[5m]) > 0.8
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "CPU alta no pod {{ $labels.pod }}"
        description: "Pod {{ $labels.pod }} está usando {{ $value | humanizePercentage }} de CPU"
    
    # Alerta: Memória alta
    - alert: AplicacaoMemoriaAlta
      expr: |
        container_memory_usage_bytes{namespace="aplicacao"} / container_spec_memory_limit_bytes > 0.85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Memória alta no pod {{ $labels.pod }}"
        description: "Pod {{ $labels.pod }} está usando {{ $value | humanizePercentage }} de memória"
    
    # Alerta: OOM (Out of Memory)
    - alert: AplicacaoOOM
      expr: |
        container_last_seen{namespace="aplicacao"} - container_last_seen offset 5m < 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} foi terminado por OOM"
        description: "Pod {{ $labels.pod }} foi terminado por falta de memória"
    
    # Alerta: Taxa de erro alta (se aplicável)
    - alert: AplicacaoTaxaErroAlta
      expr: |
        rate(http_requests_total{namespace="aplicacao", status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Taxa de erro alta"
        description: "Taxa de erro 5xx em {{ $labels.pod }} é {{ $value | humanizePercentage }}"
    
    # Alerta: Deployment sem replicas prontas
    - alert: DeploymentReplicasMismatch
      expr: |
        kube_deployment_spec_replicas{namespace="aplicacao"} != kube_deployment_status_replicas_available{namespace="aplicacao"}
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Deployment {{ $labels.deployment }} com replicas não prontas"
        description: "Deployment espera {{ $value }} replicas mas apenas {{ $labels.available }} estão disponíveis"

---
apiVersion: v1
kind: Service
metadata:
  name: aplicacao-metrics
  namespace: aplicacao
  labels:
    app: aplicacao
spec:
  selector:
    app: aplicacao
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: aplicacao
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager.openshift-monitoring:9093
    
    scrape_configs:
    - job_name: 'aplicacao'
      static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'aplicacao-prod'
