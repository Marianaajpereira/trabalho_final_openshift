# Network Policies para Segurança de Rede no OpenShift
# Controla o tráfego de entrada e saída entre pods

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aplicacao-deny-all
  namespace: aplicacao
spec:
  # Nega todo o tráfego por padrão
  podSelector:
    matchLabels:
      app: aplicacao
  policyTypes:
  - Ingress
  - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aplicacao-allow-ingress
  namespace: aplicacao
spec:
  # Permite tráfego de entrada apenas do router do OpenShift
  podSelector:
    matchLabels:
      app: aplicacao
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: openshift-ingress
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aplicacao-allow-egress
  namespace: aplicacao
spec:
  # Permite tráfego de saída para serviços internos e DNS
  podSelector:
    matchLabels:
      app: aplicacao
  policyTypes:
  - Egress
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Outros pods na mesma namespace
  - to:
    - podSelector: {}
  # Banco de dados (se externo)
  - to:
    - namespaceSelector:
        matchLabels:
          name: database
    ports:
    - protocol: TCP
      port: 5432
  # API externa (exemplo)
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: aplicacao
spec:
  # Permite que Prometheus colete métricas
  podSelector:
    matchLabels:
      app: aplicacao
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: openshift-monitoring
    ports:
    - protocol: TCP
      port: 9090
